baseURL = 'https://code-learn-build-evolve.vercel.app/'
theme = 'PaperMod'
defaultContentLanguage = 'zh'
enableEmoji = true
title = 'VECT / FIELD NOTES'

[languages.zh]
  languageCode = 'zh-CN'
  languageName = '中文'
  title = 'VECT / FIELD NOTES'
  weight = 1

[outputs]
  home = ['HTML', 'JSON']
  section = ['HTML']
  taxonomy = ['HTML']
  term = ['HTML']
  page = ['HTML']

[pagination]
  pagerSize = 10

[markup.highlight]
  noClasses = false
  lineNos = true
  lineNumbersInTable = true
  tabWidth = 4

[params]
  author = 'WoAiXueXiHa'
  description = '关于代码、系统、项目与持续成长的现场笔记。'
  mainSections = ['posts']
  defaultTheme = 'auto'
  disableThemeToggle = true
  ShowReadingTime = true
  ShowWordCount = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  dateFormat = '2006-01-02'

  [params.imageProxy]
    enabled = true
    sourcePrefix = "https://gitee.com/binary-whispers/pic/raw/master/"
    proxyPrefix = "/gitee-img/"

  [params.label]
    text = 'VECT / FIELD NOTES'

  [params.vect]
    heroSubtitle = 'Learning systems. Building software. Documenting the journey.'

