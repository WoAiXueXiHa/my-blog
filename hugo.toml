baseURL = 'https://code-learn-build-evolve.vercel.app/'
theme = 'PaperMod'
defaultContentLanguage = 'zh'
enableEmoji = true
title = 'VECT / FIELD NOTES'

[languages.zh]
  languageCode = 'zh-CN'
  languageName = '中文'
  title = 'VECT / FIELD NOTES'
  weight = 1

[outputs]
  home = ['HTML', 'JSON', 'RSS']
  section = ['HTML']
  taxonomy = ['HTML']
  term = ['HTML']
  page = ['HTML']

[pagination]
  pagerSize = 10

[markup.highlight]
  noClasses = false
  lineNos = true
  lineNumbersInTable = true
  tabWidth = 4

[markup.goldmark.extensions.passthrough]
  enable = true
  [markup.goldmark.extensions.passthrough.delimiters]
    block = [['\[', '\]'], ['$$', '$$']]
    inline = [['\(', '\)'], ['$', '$']]

[params]
  author = 'WoAiXueXiHa'
  description = '关于代码、系统、项目与持续成长的现场笔记。'
  mainSections = ['posts']
  defaultTheme = 'auto'
  disableThemeToggle = true
  ShowReadingTime = true
  ShowWordCount = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  dateFormat = '2006-01-02'
  ShowPostNavLinks = true

  [params.label]
    text = 'VECT / FIELD NOTES'

  [params.assets]
    favicon = 'favicon.svg'
    favicon16x16 = 'favicon.svg'
    favicon32x32 = 'favicon.svg'

  [params.vect]
    heroSubtitle = 'Learning systems. Building software. Documenting the journey.'

[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/WoAiXueXiHa'

[[params.socialIcons]]
  name = 'email'
  url = 'mailto:1760198676@qq.com'

[menu]
  [[menu.main]]
    name = '文章'
    url = '/posts/'
    weight = 1
  [[menu.main]]
    name = '学习路径'
    url = '/paths/'
    weight = 2
  [[menu.main]]
    name = '知识地图'
    url = '/topics/'
    weight = 3
  [[menu.main]]
    name = '关于我'
    url = '/about/'
    weight = 4
  [[menu.main]]
    name = '搜索'
    url = '/search/'
    weight = 5

[taxonomies]
  tag = 'tags'
  category = 'categories'
  series = 'series'

[related]
  threshold = 20
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = 'series'
    weight = 100
  [[related.indices]]
    name = 'categories'
    weight = 70
  [[related.indices]]
    name = 'tags'
    weight = 50
