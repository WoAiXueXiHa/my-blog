<header class="header vect-site-header">
  <div class="vect-reading-progress" aria-hidden="true"><i></i></div>
  <nav class="header-nav" aria-label="主导航">
    <a class="vect-logo" href="{{ "" | relLangURL }}" accesskey="h" aria-label="VECT / FIELD NOTES 首页">VECT <i>/</i> FIELD NOTES</a>
    <div class="vect-nav-actions">
      <ul id="menu" class="menu">{{- $current := . -}}{{- range site.Menus.main }}{{- if ne .URL "/search/" }}<li><a href="{{ .URL | relLangURL }}" {{ if $current.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>{{ .Name }}</a></li>{{- end }}{{- end }}</ul>
      <button class="vect-icon-button" type="button" data-search-open aria-label="打开搜索" title="搜索（Ctrl/⌘ K）">⌕</button>
      <button class="vect-icon-button" id="vect-theme" type="button" aria-label="切换颜色模式" title="颜色模式"><span data-theme-icon>◐</span></button>
      <button class="vect-icon-button vect-menu-button" type="button" aria-controls="menu" aria-expanded="false" aria-label="打开导航">☰</button>
    </div>
  </nav>
</header>
<div class="vect-search" role="dialog" aria-modal="true" aria-label="站内搜索" hidden>
  <button class="vect-search-backdrop" type="button" data-search-close aria-label="关闭搜索"></button>
  <section class="vect-search-panel">
    <header><label for="vect-search-input">搜索文章与主题</label><button type="button" data-search-close aria-label="关闭搜索">×</button></header>
    <input id="vect-search-input" type="search" placeholder="输入关键词…" autocomplete="off" spellcheck="false">
    <p class="vect-search-hint">输入关键词开始搜索 · ↑↓ 选择 · Enter 打开 · Esc 关闭</p>
    <ul class="vect-search-results" role="listbox" aria-label="搜索结果"></ul>
  </section>
</div>
