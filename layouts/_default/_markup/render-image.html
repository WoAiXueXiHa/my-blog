{{- $src := .Destination -}}
{{- $resource := .Page.Resources.GetMatch .Destination -}}
{{- with $resource -}}{{- $src = .RelPermalink -}}{{- end -}}
<img
  src="{{ $src | safeURL }}"
  alt="{{ .Text }}"
  {{- with .Title }} title="{{ . }}"{{ end }}
  {{- with $resource }} width="{{ .Width }}" height="{{ .Height }}"{{ end }}
  loading="lazy"
  decoding="async"
/>
